<!DOCTYPE html>
<html>
<body>
<h1>Local WebSocket Terminal</h1>

<input id="cmd" placeholder="Type a command">
<button onclick="sendCmd()">Run</button>

<pre id="out"></pre>

<script>
// ⭐ LOCAL WebSocket URL
const ws = new WebSocket("ws://127.0.0.1:10000/terminal");

ws.onopen = () => {
    document.getElementById("out").textContent += "Connected to local terminal\n";
};

ws.onmessage = (msg) => {
    document.getElementById("out").textContent += msg.data + "\n";
};

function sendCmd() {
    const cmd = document.getElementById("cmd").value;
    ws.send(cmd);
}
</script>

</body>
</html>
