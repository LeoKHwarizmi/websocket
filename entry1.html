<!DOCTYPE html>
<html>
<body>
<h1>WebSocket Terminal</h1>

<input id="cmd" placeholder="Type a command">
<button onclick="sendCmd()">Run</button>

<pre id="out"></pre>

<script>
const ws = new WebSocket("wss://websocket-f5e6.onrender.com/terminal");

ws.onopen = () => {
    document.getElementById("out").textContent += "Connected to terminal\n";
};

ws.onmessage = (msg) => {
    document.getElementById("out").textContent += msg.data + "\n";
};

function sendCmd() {
    const cmd = document.getElementById("cmd").value;
    ws.send(cmd);
}
</script>

</body>
</html>
