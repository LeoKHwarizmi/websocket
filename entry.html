<!DOCTYPE html>
<html>
<body>
<h1>WebSocket Test</h1>

<input id="cmd" placeholder="Type a command">
<button onclick="sendCmd()">Run</button>

<pre id="out"></pre>

<script>
const ws = new WebSocket("wss://websocket-f5e6.onrender.com/ws");
//const ws = new WebSocket("wss://websocket-f5e6.onrender.com/terminal");

//const ws = new WebSocket("ws://127.0.0.1:10000/terminal");
//const ws = new WebSocket("ws://127.0.0.1:10000/terminal");

// When connected
ws.onopen = () => {
    console.log("Connected!");

    // Send a message to the server (same as Python)
    ws.send("hello");
};

// When receiving a message
ws.onmessage = (msg) => {
    console.log("Server:", msg.data);
};
/*
ws.onopen = () => {
    document.getElementById("out").textContent += "Connected to local terminal\n";
};

ws.onmessage = (msg) => {
    document.getElementById("out").textContent += msg.data + "\n";
};
*/
function sendCmd() {
    const cmd = document.getElementById("cmd").value;
    ws.send(cmd);
}
</script>

</body>
</html>
